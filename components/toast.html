<!-- components/toast.html — rich toast notification system -->
<!-- Loaded via fetch(), overrides basic ReclaimX.toast() from main.js -->

<div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="false"></div>

<script>
(function() {
  const container = document.getElementById('toastContainer');
  const ICONS = {
    success: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`,
    error:   `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
    warning: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
    info:    `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>`,
  };
  const COLORS = {
    success: 'var(--accent)',
    error:   'var(--danger)',
    warning: 'var(--warning)',
    info:    'var(--violet)',
  };

  window.ReclaimX = window.ReclaimX || {};
  window.ReclaimX.toast = function(message, type, duration) {
    type     = type     || 'success';
    duration = duration || 4000;

    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.setAttribute('role', 'alert');

    // Progress bar
    const progressId = 'tp-' + Date.now();
    toast.innerHTML = `
      <span style="
        width:20px;height:20px;border-radius:50%;
        display:flex;align-items:center;justify-content:center;
        flex-shrink:0;background:${COLORS[type]}22;
        color:${COLORS[type]};margin-top:1px;
      ">${ICONS[type] || ICONS.success}</span>
      <span style="flex:1;line-height:1.4">${message}</span>
      <button class="toast-close" aria-label="Dismiss">×</button>
      <div id="${progressId}" style="
        position:absolute;bottom:0;left:0;height:2px;
        background:${COLORS[type]};opacity:0.5;
        width:100%;border-radius:0 0 var(--radius-md) var(--radius-md);
        transition:width ${duration}ms linear;
      "></div>
    `;

    container.appendChild(toast);

    // Animate progress bar
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        const bar = document.getElementById(progressId);
        if (bar) bar.style.width = '0%';
      });
    });

    function dismiss() {
      toast.style.transition = 'opacity 0.3s, transform 0.3s';
      toast.style.opacity    = '0';
      toast.style.transform  = 'translateX(60px)';
      setTimeout(() => toast.remove(), 300);
    }

    let timer = setTimeout(dismiss, duration);
    toast.querySelector('.toast-close').addEventListener('click', () => { clearTimeout(timer); dismiss(); });
    toast.addEventListener('mouseenter', () => { clearTimeout(timer); });
    toast.addEventListener('mouseleave', () => { timer = setTimeout(dismiss, 1500); });
  };
})();
</script>
